<div class="services-container">
    <h2>PREMIUM QUALITY</h2>
    {% for service in services %}
        <li>
            <img src="{{ url_for('static', filename='images/services/' ~ service.image) }}" alt="{{ service.name }}">
            <h3>{{ service.name }}</h3>
            <p>{{ service.description }}</p>
        </li>
    {% endfor %}
</div>
